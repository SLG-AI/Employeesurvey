name: Scan RGPD (informatif)
# Informe le développeur de ce qui reste à mettre en place pour le RGPD.
# NE BLOQUE JAMAIS le build : le résumé apparaît dans l'onglet Actions de la PR.
on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  rgpd-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Scan RGPD
        run: node rgpd-scan.cjs   # exit 0 garanti — informatif ; écrit rgpd-report.html en CI
      - name: Rapport RGPD (téléchargeable — fin de dev sur main)
        uses: actions/upload-artifact@v4
        with:
          name: rapport-rgpd
          path: rgpd-report.html
          if-no-files-found: warn
